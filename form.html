    <title>Add a new Question</title>
    <script src="form.js" defer></script>

<body>
     <form  class="Question-Card-submit" data-js="Question-Card-Submit">
                <fieldset class="question-card-container">
                    <legend class="YourQuestion">Create your own Question about Harry Potter!</legend>
                    <label for="yourQuestion">Your Question</label>
                    <textarea
                    data-js="yourQuestion"
                    name="yourQuestion"
                    id="yourQuestion"
                    rows="5"
                    cols="30"
                    maxlength="150"
                    placeholder="Write your Question in here"
                ></textarea>
                <div class="remaining-chars-container">
                    <p class="remaining-characters" data-js="remaining-Chars-Number-Question">150</p>
                    <p class="remaining-characters">Words left</p>
                    </div> 
                    <label for="your-answer">Your Answer</label>
                    <textarea
                    data-js="yourAnswer"
                    name="yourAnswer"
                    id="yourAnswer"
                    rows="5"
                    cols="30"
                    placeholder="Write the Answer to your Question in here"
                    ></textarea>
                    <div class="remaining-chars-container">
                    <p class="remaining-characters" data-js="remaining-Chars-Number-Answer">150</p>
                    <p class="remaining-characters">Words left</p>
                    </div>                    
                    <label for="tag">Tag:</label>
                    <input
                    data-js="tag"
                    type="text"
                    name="tag"
                    id="tag"
                    placeholder="Your tag"
                    />
                <button type="submit" data-js="Submit-Button">Add your Question!</button>
                    </fieldset>
                    </form>
                    <section data-js="question-cards" class="question-cards" aria-label="question-cards"></section>
